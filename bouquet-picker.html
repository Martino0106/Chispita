<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💐 Bouquet Picker - I Love You 💐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #fef6e4 0%, #ffe5f0 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #d946a6;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .flowers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .flower-card {
            background: #f9f4ff;
            border: 3px solid #e0b0ff;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .flower-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(217, 70, 166, 0.2);
        }

        .flower-svg {
            width: 100px;
            height: 100px;
            margin: 0 auto 10px;
            display: block;
        }

        .bouquet-visual {
            font-size: 4em;
            transition: font-size 0.4s ease;
            animation: bounce 0.8s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .finish-button, .clear-button {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .finish-button {
            background: linear-gradient(135deg, #d946a6 0%, #ec4899 100%);
            color: white;
        }

        .finish-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(217, 70, 166, 0.4);
        }

        .clear-button {
            background: #f0f0f0;
            color: #666;
        }

        .bouquet-item {
            background: linear-gradient(135deg, #fff5fb 0%, #f0e6ff 100%);
            border: 2px solid #d946a6;
            border-radius: 10px;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .remove-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .heart-animation {
            position: fixed;
            font-size: 3em;
            pointer-events: none;
            animation: fall 3s ease-in forwards;
            z-index: 999;
        }

        @keyframes fall {
            0% { opacity: 1; transform: translateY(-100px) rotate(0deg); }
            100% { opacity: 0; transform: translateY(100vh) rotate(360deg); }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 999;
        }

        .finish-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 60px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .love-card {
            font-size: 2em;
            color: #d946a6;
            margin: 30px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌸 Bouquet Picker 🌸</h1>
        <p style="text-align: center; color: #999; margin-bottom: 30px;">Pick your favorite flowers!</p>

        <h2 style="color: #d946a6; margin-bottom: 20px;">Available Flowers</h2>
        <div class="flowers-grid" id="flowersGrid"></div>

        <h2 style="color: #d946a6; margin-top: 30px; margin-bottom: 20px;">Your Bouquet</h2>
        <div class="bouquet-visual" id="bouquetVisual" style="text-align: center; display: none;">💐</div>
        <div id="sizeIndicator" style="text-align: center; color: #d946a6; font-weight: bold; margin-bottom: 20px; display: none;"></div>
        <div id="bouquetContainer" style="background: #f9f4ff; border: 2px solid #e0b0ff; border-radius: 15px; padding: 15px; min-height: 150px; display: flex; flex-direction: column; gap: 10px;"></div>

        <div class="button-group">
            <button class="finish-button" onclick="finishBouquet()">💝 Finish Bouquet</button>
            <button class="clear-button" onclick="clearBouquet()">Clear All</button>
        </div>
    </div>

    <script>
        const flowers = {
            'Hibiscus': {
                colors: ['#FF6B9D', '#FF4757', '#FFA502'],
                svg: (color) => `<svg viewBox="0 0 100 100" class="flower-svg"><ellipse cx="50" cy="20" rx="15" ry="25" fill="${color}"/><ellipse cx="75" cy="35" rx="15" ry="25" fill="${color}" transform="rotate(72 50 50)"/><ellipse cx="75" cy="35" rx="15" ry="25" fill="${color}" transform="rotate(144 50 50)"/><ellipse cx="75" cy="35" rx="15" ry="25" fill="${color}" transform="rotate(216 50 50)"/><ellipse cx="75" cy="35" rx="15" ry="25" fill="${color}" transform="rotate(288 50 50)"/><circle cx="50" cy="50" r="12" fill="#FFD700"/><circle cx="50" cy="50" r="8" fill="#FF69B4"/><line x1="50" y1="50" x2="50" y2="80" stroke="#8B0000" stroke-width="2"/><circle cx="50" cy="80" r="3" fill="#8B0000"/><line x1="50" y1="80" x2="50" y2="100" stroke="#2D5016" stroke-width="2"/></svg>`
            },
            'Peonies': {
                colors: ['#FFB6C1', '#FF69B4', '#FF1493'],
                svg: (color) => `<svg viewBox="0 0 100 100" class="flower-svg"><circle cx="50" cy="30" r="8" fill="${color}"/><circle cx="45" cy="35" r="8" fill="${color}"/><circle cx="55" cy="35" r="8" fill="${color}"/><circle cx="40" cy="42" r="8" fill="${color}"/><circle cx="60" cy="42" r="8" fill="${color}"/><circle cx="50" cy="45" r="8" fill="${color}"/><circle cx="50" cy="50" r="5" fill="#FFD700"/><line x1="50" y1="60" x2="50" y2="100" stroke="#2D5016" stroke-width="3"/></svg>`
            },
            'Tulips': {
                colors: ['#FFD700', '#FF6347', '#8A2BE2'],
                svg: (color) => `<svg viewBox="0 0 100 100" class="flower-svg"><path d="M 45 25 Q 45 20 50 18 Q 55 20 55 25 L 55 45 Q 55 50 50 52 Q 45 50 45 45 Z" fill="${color}"/><path d="M 40 30 Q 35 28 33 35 L 35 48 Q 37 50 42 48 L 42 38 Z" fill="${color}" opacity="0.85"/><path d="M 60 30 Q 65 28 67 35 L 65 48 Q 63 50 58 48 L 58 38 Z" fill="${color}" opacity="0.85"/><circle cx="50" cy="40" r="5" fill="#FFB347" opacity="0.6"/><line x1="50" y1="50" x2="50" y2="100" stroke="#2D5016" stroke-width="2.5"/></svg>`
            },
            'Alstroemeria': {
                colors: ['#FFA500', '#FF8C00', '#FF69B4'],
                svg: (color) => `<svg viewBox="0 0 100 100" class="flower-svg"><path d="M 50 20 L 60 40 L 75 35 L 65 50 L 75 65 L 60 60 L 50 80 L 40 60 L 25 65 L 35 50 L 25 35 L 40 40 Z" fill="${color}"/><circle cx="50" cy="50" r="6" fill="#FFD700"/><line x1="50" y1="80" x2="50" y2="100" stroke="#2D5016" stroke-width="2"/></svg>`
            },
            'Gerbera': {
                colors: ['#FFB347', '#FF6347', '#FF0000'],
                svg: (color) => `<svg viewBox="0 0 100 100" class="flower-svg"><circle cx="50" cy="30" r="6" fill="${color}"/><circle cx="60" cy="35" r="6" fill="${color}"/><circle cx="65" cy="45" r="6" fill="${color}"/><circle cx="60" cy="55" r="6" fill="${color}"/><circle cx="50" cy="60" r="6" fill="${color}"/><circle cx="40" cy="55" r="6" fill="${color}"/><circle cx="35" cy="45" r="6" fill="${color}"/><circle cx="40" cy="35" r="6" fill="${color}"/><circle cx="50" cy="45" r="8" fill="#FFD700"/><circle cx="50" cy="45" r="4" fill="#FF8C00"/><line x1="50" y1="65" x2="50" y2="100" stroke="#2D5016" stroke-width="3"/></svg>`
            },
            'Lilium': {
                colors: ['#FF69B4', '#FFB6C1', '#FF1493'],
                svg: (color) => `<svg viewBox="0 0 100 100" class="flower-svg"><path d="M 45 25 Q 42 35 40 50 Q 40 60 45 65 L 50 50 Z" fill="${color}"/><path d="M 55 25 Q 58 35 60 50 Q 60 60 55 65 L 50 50 Z" fill="${color}"/><path d="M 50 28 Q 48 40 48 55 Q 48 65 50 68 L 50 50 Z" fill="${color}"/><path d="M 50 28 Q 52 40 52 55 Q 52 65 50 68 L 50 50 Z" fill="${color}"/><line x1="48" y1="50" x2="45" y2="62" stroke="#8B4513" stroke-width="1.5"/><line x1="50" y1="50" x2="50" y2="64" stroke="#8B4513" stroke-width="1.5"/><line x1="52" y1="50" x2="55" y2="62" stroke="#8B4513" stroke-width="1.5"/><circle cx="50" cy="45" r="5" fill="#FFD700"/><line x1="50" y1="68" x2="50" y2="100" stroke="#2D5016" stroke-width="2.5"/></svg>`
            }
        };

        let bouquet = [];

        function initializeFlowers() {
            const grid = document.getElementById('flowersGrid');
            Object.entries(flowers).forEach(([name, data]) => {
                data.colors.forEach(color => {
                    const card = document.createElement('div');
                    card.className = 'flower-card';
                    card.onclick = () => addFlower(name, color);
                    card.innerHTML = `${data.svg(color)}<div style="font-weight: bold; color: #666;">${name}</div>`;
                    grid.appendChild(card);
                });
            });
        }

        function addFlower(name, color) {
            bouquet.push({name, color});
            updateDisplay();
        }

        function removeFlower(idx) {
            bouquet.splice(idx, 1);
            updateDisplay();
        }

        function updateDisplay() {
            const container = document.getElementById('bouquetContainer');
            const visual = document.getElementById('bouquetVisual');
            const indicator = document.getElementById('sizeIndicator');

            if (bouquet.length === 0) {
                container.innerHTML = '<div style="color: #ccc; font-style: italic;">Click flowers to add them!</div>';
                visual.style.display = 'none';
                indicator.style.display = 'none';
            } else {
                const size = Math.min(4 + bouquet.length * 0.4, 6);
                visual.style.fontSize = size + 'em';
                visual.style.display = 'block';
                indicator.style.display = 'block';
                indicator.textContent = `${bouquet.length} flower${bouquet.length > 1 ? 's' : ''} 🌹`;

                container.innerHTML = bouquet.map((f, i) => `
                    <div class="bouquet-item">
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <div style="width: 20px; height: 20px; background: ${f.color}; border-radius: 50%;"></div>
                            ${f.name}
                        </div>
                        <button class="remove-btn" onclick="removeFlower(${i})">×</button>
                    </div>
                `).join('');
            }
        }

        function clearBouquet() {
            bouquet = [];
            updateDisplay();
        }

        function finishBouquet() {
            if (!bouquet.length) {
                alert('Pick flowers first! 🌸');
                return;
            }

            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            document.body.appendChild(overlay);

            const msg = document.createElement('div');
            msg.className = 'finish-message';
            msg.innerHTML = `<div style="font-size: 5em; margin: 20px 0;">💐</div><div class="love-card">💕 I LOVE YOU 💕</div>`;
            document.body.appendChild(msg);

            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart-animation';
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * window.innerWidth + 'px';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 3000);
                }, i * 100);
            }

            setTimeout(() => { overlay.remove(); msg.remove(); }, 4000);
        }

        document.addEventListener('DOMContentLoaded', initializeFlowers);
    </script>
</body>
</html>
