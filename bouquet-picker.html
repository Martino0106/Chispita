<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouquet Picker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Comic Sans MS', cursive; background: linear-gradient(135deg, #fef6e4, #ffe5f0); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { max-width: 1000px; width: 100%; background: white; border-radius: 30px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #d946a6; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: #f9f4ff; border: 3px solid #e0b0ff; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .card:hover { transform: scale(1.05); box-shadow: 0 10px 25px rgba(217,70,166,0.2); }
        .bouquet { font-size: 4em; text-align: center; margin: 30px 0; transition: font-size 0.4s; animation: bounce 0.8s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .list { background: #f9f4ff; border: 2px solid #e0b0ff; border-radius: 15px; padding: 15px; min-height: 100px; margin-bottom: 20px; }
        .item { background: white; border: 2px solid #d946a6; border-radius: 10px; padding: 10px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 1em; cursor: pointer; margin: 5px; }
        .finish { background: #d946a6; color: white; }
        .finish:hover { box-shadow: 0 10px 25px rgba(217,70,166,0.4); }
        .clear { background: #f0f0f0; }
        .remove { background: #ff6b6b; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }
        .heart { position: fixed; font-size: 3em; animation: fall 3s forwards; z-index: 999; }
        @keyframes fall { 0% { opacity: 1; transform: translateY(0) rotate(0deg); } 100% { opacity: 0; transform: translateY(100vh) rotate(360deg); } }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .message { background: white; padding: 60px; border-radius: 30px; text-align: center; box-shadow: 0 30px 80px rgba(0,0,0,0.3); }
        .love { font-size: 2.5em; color: #d946a6; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bouquet Picker</h1>
        <h2 style="color: #d946a6; margin-bottom: 20px;">Pick Your Flowers</h2>
        <div class="grid" id="flowers"></div>
        <h2 style="color: #d946a6; margin: 30px 0 20px;">Your Bouquet</h2>
        <div class="bouquet" id="visual">💐</div>
        <div id="counter" style="text-align: center; color: #d946a6; font-weight: bold; margin-bottom: 20px;"></div>
        <div class="list" id="list"></div>
        <button class="btn finish" onclick="finish()">Finish Bouquet</button>
        <button class="btn clear" onclick="clearAll()">Clear All</button>
    </div>

    <script>
        const flowers = {
            Hibiscus: { colors: ['#FF6B9D', '#FF4757', '#FFA502'] },
            Peonies: { colors: ['#FFB6C1', '#FF69B4', '#FF1493'] },
            Tulips: { colors: ['#FFD700', '#FF6347', '#8A2BE2'] },
            Alstroemeria: { colors: ['#FFA500', '#FF8C00', '#FF69B4'] },
            Gerbera: { colors: ['#FFB347', '#FF6347', '#FF0000'] },
            Lilium: { colors: ['#FF69B4', '#FFB6C1', '#FF1493'] }
        };

        let bouquet = [];

        function initFlowers() {
            const div = document.getElementById('flowers');
            for (const [name, data] of Object.entries(flowers)) {
                data.colors.forEach(color => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.background = color;
                    card.textContent = name;
                    card.style.color = 'white';
                    card.style.fontWeight = 'bold';
                    card.style.fontSize = '0.9em';
                    card.style.display = 'flex';
                    card.style.alignItems = 'center';
                    card.style.justifyContent = 'center';
                    card.style.minHeight = '80px';
                    card.onclick = () => add(name, color);
                    div.appendChild(card);
                });
            }
        }

        function add(name, color) {
            bouquet.push({ name, color });
            update();
        }

        function remove(i) {
            bouquet.splice(i, 1);
            update();
        }

        function update() {
            const list = document.getElementById('list');
            const visual = document.getElementById('visual');
            const counter = document.getElementById('counter');

            if (bouquet.length === 0) {
                list.innerHTML = '<div style="color: #ccc; text-align: center; padding: 20px;">Click flowers to add them!</div>';
                visual.style.display = 'none';
                counter.innerHTML = '';
            } else {
                const size = Math.min(4 + bouquet.length * 0.4, 6);
                visual.style.fontSize = size + 'em';
                visual.style.display = 'block';
                counter.innerHTML = bouquet.length + ' flower' + (bouquet.length !== 1 ? 's' : '');

                list.innerHTML = bouquet.map((f, i) => `
                    <div class="item">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div style="width: 20px; height: 20px; background: ${f.color}; border-radius: 50%;"></div>
                            ${f.name}
                        </div>
                        <button class="remove" onclick="remove(${i})">x</button>
                    </div>
                `).join('');
            }
        }

        function clearAll() {
            bouquet = [];
            update();
        }

        function finish() {
            if (bouquet.length === 0) {
                alert('Pick flowers first!');
                return;
            }

            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = '<div class="message"><div style="font-size: 5em;">💐</div><div class="love">I LOVE YOU</div></div>';
            document.body.appendChild(modal);

            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * window.innerWidth + 'px';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 3000);
                }, i * 100);
            }

            setTimeout(() => modal.remove(), 4000);
        }

        initFlowers();
        update();
    </script>
</body>
</html>
