<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Bouquet Picker</title>\n    <style>\n        .flower {\n            display: inline-block;\n            margin: 10px;\n        }\n        .bouquet {\n            font-size: 4em;\n            transition: font-size 0.5s;\n        }\n    </style>\n</head>\n<body>\n    <h1>Select Your Flowers</h1>\n    <div id="flower-selection">\n        <div class="flower" id="hibiscus">\n            <img src="hibiscus.svg" alt="Hibiscus">\n            <p>Hibiscus</p>\n        </div>\n        <div class="flower" id="peonies">\n            <img src="peonies.svg" alt="Peonies">\n            <p>Peonies</p>\n        </div>\n        <div class="flower" id="tulips">\n            <img src="tulips.svg" alt="Tulips">\n            <p>Tulips</p>\n        </div>\n        <div class="flower" id="alstroemeria">\n            <img src="alstroemeria.svg" alt="Alstroemeria">\n            <p>Alstroemeria</p>\n        </div>\n        <div class="flower" id="gerbera">\n            <img src="gerbera.svg" alt="Gerbera">\n            <p>Gerbera</p>\n        </div>\n        <div class="flower" id="lilium">\n            <img src="lilium.svg" alt="Lilium">\n            <p>Lilium</p>\n        </div>\n    </div>\n    <div class="bouquet" id="bouquet">🌸</div>\n    <script>\n        const flowers = document.querySelectorAll('.flower');\n        const bouquet = document.getElementById('bouquet');\n        let flowerCount = 0;\n\n        flowers.forEach(flower => {\n            flower.addEventListener('click', () => {\n                flowerCount++;\n                const newSize = Math.min(4 + flowerCount * 0.4, 6);\n                bouquet.style.fontSize = newSize + 'em';\n                bouquet.innerHTML += '🌸';\n            });\n        });\n    </script>\n</body>\n</html>
